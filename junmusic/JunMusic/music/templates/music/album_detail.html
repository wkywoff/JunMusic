<!-- music/templates/music/album_detail.html -->
{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">

<div class="navigation">
    <a href="#" id="back-button" class="back-button">&lt;</a>
    <a href="#" id="forward-button" class="forward-button">&gt;</a>
</div>
<h1>{{ album.title }}</h1>
<p>Артист: <a href="{% url 'artist_detail' album.artist.id %}">{{ album.artist.name }}</a></p>
<p>Год: {{ album.year }}</p>
{% if album.cover %}
    <img src="{{ album.cover.url }}" alt="{{ album.title }}" width="200">
{% else %}
    <p>Нет обложки</p>
{% endif %}
<h2>Треки</h2>
<ul>
{% for track in tracks %}
    <li><a href="{% url 'track_detail' track.id %}">{{ track.title }}</a></li>
{% endfor %}
</ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const backButton = document.getElementById('back-button');
    const forwardButton = document.getElementById('forward-button');

    if (window.history.length > 1) {
        backButton.classList.remove('disabled');
        backButton.addEventListener('click', function(e) {
            e.preventDefault();
            window.history.back();
        });
    } else {
        backButton.classList.add('disabled');
    }

    forwardButton.classList.add('disabled');
    window.addEventListener('popstate', function() {
        if (window.history.length > 1) {
            backButton.classList.remove('disabled');
            forwardButton.classList.remove('disabled');
        }
    });

    forwardButton.addEventListener('click', function(e) {
        e.preventDefault();
        window.history.forward();
    });
});
</script>
